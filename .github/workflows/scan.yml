name: Container Security Scan

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t myapp:${{ github.sha }} .

      # Step A: Table log mein dikhao (kabhi fail nahi hota)
      - name: Show vulnerabilities (table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp:${{ github.sha }}
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      # Step B: JSON report save karo
      - name: Generate JSON report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp:${{ github.sha }}
          format: json
          output: scan-report.json
          exit-code: 0

      # Step C: SECURITY GATE - yahi pass/fail decide karta hai
      - name: Security gate
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp:${{ github.sha }}
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true    # jinka fix hi nahi nikla, unpe block mat karo

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report
          path: scan-report.json