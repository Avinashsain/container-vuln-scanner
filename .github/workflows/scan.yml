name: Container Security Scan

# When to run: every push to main, and every pull request
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Download your repo code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Build the Docker image
      - name: Build image
        run: docker build -t myapp:${{ github.sha }} .

      # Step 3: Scan with Trivy (official action)
      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp:${{ github.sha }}
          format: json
          output: scan-report.json
          exit-code: 1                 # fail the job on findings
          severity: HIGH,CRITICAL      # ...at these levels

      # Step 4: Save the report even if the scan failed
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report
          path: scan-report.json